[build]
  command = "npm run build"
  publish = "dist"

# Admin dashboard: discourage indexing + strip from SPA fallback so it doesn't
# resolve on the root route. Long-term: move behind Netlify password protection
# or a separate unlisted host.
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store, max-age=0"

[[redirects]]
  from = "/admin.html"
  to = "/admin.html"
  status = 200
  force = true

# 301 legacy domain → baddesiplots.com. Preserves inbound links + bookmarks
# from pre-rebrand (badbollywoodplots.com era, ~38 uniques as of 2026-04-20).
[[redirects]]
  from = "https://www.badbollywoodplots.com/*"
  to = "https://baddesiplots.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://badbollywoodplots.com/*"
  to = "https://baddesiplots.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
