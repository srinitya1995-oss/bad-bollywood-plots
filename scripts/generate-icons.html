<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
  * { margin: 0; padding: 0; }
</style>
</head>
<body>

<!-- 512px icon -->
<div id="icon-512" style="width:512px;height:512px;background:#C8321C;border-radius:96px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;">
  <div style="font-family:'Anton',sans-serif;font-size:320px;color:#F6EBD1;letter-spacing:-8px;line-height:1;padding-top:20px;">B</div>
  <div style="position:absolute;bottom:0;left:0;right:0;height:6px;background:#F5C457;"></div>
</div>

<!-- 512px maskable (extra padding) -->
<div id="icon-512-maskable" style="width:512px;height:512px;background:#C8321C;display:flex;align-items:center;justify-content:center;position:relative;">
  <div style="font-family:'Anton',sans-serif;font-size:240px;color:#F6EBD1;letter-spacing:-6px;line-height:1;padding-top:14px;">B</div>
  <div style="position:absolute;bottom:0;left:0;right:0;height:6px;background:#F5C457;"></div>
</div>

<!-- OG Image 1200x630 -->
<div id="og-image" style="width:1200px;height:630px;background:#14100a;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;">
  <!-- Top tomato band -->
  <div style="position:absolute;top:0;left:0;right:0;height:8px;background:#C8321C;"></div>
  <!-- Bottom gold line -->
  <div style="position:absolute;bottom:0;left:0;right:0;height:4px;background:#F5C457;"></div>

  <!-- Kicker -->
  <div style="font-family:'Anton',sans-serif;font-size:18px;color:#F5C457;letter-spacing:8px;text-transform:uppercase;margin-bottom:12px;">THE DESI PARTY GAME</div>

  <!-- Title -->
  <div style="font-family:'Anton',sans-serif;font-size:120px;color:#F6EBD1;letter-spacing:4px;line-height:0.95;text-align:center;">
    BAD<br>
    <span style="color:#C8321C;">BOLLYWOOD</span><br>
    PLOTS
  </div>

  <!-- Tagline -->
  <div style="font-family:Georgia,serif;font-size:22px;color:#F6EBD1;opacity:0.7;margin-top:24px;font-style:italic;">
    We describe movies badly. You guess the film.
  </div>

  <!-- URL -->
  <div style="font-family:'Anton',sans-serif;font-size:16px;color:#F5C457;letter-spacing:4px;margin-top:20px;opacity:0.8;">
    BADDESIPLOTS.COM
  </div>
</div>

</body>
</html>
