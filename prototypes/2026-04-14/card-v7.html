<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Desi Plots — v7 · fixed card shape + bg audition</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:wght@400;500;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6EBD1;
    --ink: #1A1208;
    --ink-soft: rgba(26,18,8,0.55);
    --ink-line: rgba(26,18,8,0.22);
    --pen: #1B3F8C;
    --tomato: #C8321C;
    --stage: #14100a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #1a1109;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    color: var(--ink);
  }
  .phone {
    width: 400px;
    height: 860px;
    border-radius: 44px;
    background: var(--stage);
    box-shadow: 0 36px 90px rgba(0,0,0,0.5), 0 0 0 8px #0a0503, 0 0 0 10px #1f1208;
    overflow: hidden;
    position: relative;
  }
  .notch {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 112px;
    height: 26px;
    background: #0a0503;
    border-radius: 14px;
    z-index: 40;
  }
  .bg { position: absolute; inset: 0; }
  .bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center bottom;
    filter: saturate(0.98);
  }
  .wash {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(20,16,8,0.35) 0%, rgba(20,16,8,0.05) 15%, rgba(20,16,8,0.05) 65%, rgba(20,16,8,0.55) 100%);
    pointer-events: none;
  }
  .meta-bar {
    position: absolute;
    top: 52px;
    left: 0;
    right: 0;
    padding: 0 28px;
    display: flex;
    justify-content: space-between;
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    z-index: 15;
    opacity: 0.9;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .meta-bar .score { color: #F7D05B; }

  /* FIXED-SHAPE CARD */
  .card {
    position: absolute;
    top: 140px;
    left: 30px;
    right: 30px;
    height: 440px;
    background: var(--paper);
    border-radius: 4px;
    padding: 22px 26px 20px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(26,18,8,0.15);
    display: flex;
    flex-direction: column;
  }
  .card-wordmark {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 9px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding-bottom: 12px;
    border-bottom: 1px solid var(--ink-line);
    flex-shrink: 0;
  }
  .card-num {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 10px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .plot-wrap {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: center;
  }
  .card-plot {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 24px;
    line-height: 1.26;
    color: var(--ink);
    letter-spacing: -0.005em;
    text-align: left;
    width: 100%;
  }
  .card-rule {
    height: 1px;
    background: var(--ink-line);
    margin: 14px 0 12px;
    flex-shrink: 0;
  }
  .pen-wrap {
    height: 26px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .card-pen {
    font-family: 'Caveat', cursive;
    font-weight: 500;
    font-size: 21px;
    line-height: 1;
    color: var(--pen);
    text-align: left;
    width: 100%;
  }
  .card-foot {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--ink-line);
    flex-shrink: 0;
  }

  .actions {
    position: absolute;
    bottom: 28px;
    left: 24px;
    right: 24px;
    display: flex;
    gap: 12px;
    z-index: 30;
  }
  .btn {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 15px 12px;
    border-radius: 999px;
    border: 1px solid rgba(246,235,209,0.4);
    background: rgba(20,16,8,0.55);
    color: var(--paper);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .btn.primary {
    background: var(--paper);
    color: var(--ink);
    border-color: var(--paper);
    flex: 1.5;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="bg"><img id="bgImg" src="/inspiration/b0c397fda38eb0c4c5df536cbefa06dc.jpg" alt=""></div>
    <div class="wash"></div>

    <div class="meta-bar">
      <span id="turn">Turn 3</span>
      <span class="score" id="score">12 pts</span>
    </div>

    <div class="card">
      <div class="card-wordmark">Bad Desi Plots</div>
      <div class="card-num">
        <span id="num">No. 024</span>
        <span id="genre">Bollywood · Medium</span>
      </div>
      <div class="plot-wrap">
        <div class="card-plot" id="plot">
          A grieving dancer trains a blind girl to sing in a Greek villa while his mother disapproves. A chiffon saree is always flying.
        </div>
      </div>
      <div class="card-rule"></div>
      <div class="pen-wrap">
        <div class="card-pen" id="pen">arrey itna SAD kyun banaya??</div>
      </div>
      <div class="card-foot">
        <span id="worth">Worth 2 pts</span>
        <span id="phase">Pass the phone</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn">Skip</button>
      <button class="btn primary">Flip Card</button>
    </div>
  </div>
<script>
  // --- URL params: ?bg=<basename>&p=1..4 ---
  const BGS = {
    chai:   '/inspiration/b0c397fda38eb0c4c5df536cbefa06dc.jpg', // chai-cheers
    radio:  '/inspiration/6b219c5c4211a854833abea96fe55db4.jpg', // radio + kettle + tiles
    hand:   '/inspiration/0286f0d45cf13b64d19d2052673cf4c0.jpg', // orange + mehendi hand
    haveli: '/inspiration/28cb4d1b3ce98e985c80c16d2a56283e.jpg', // mumbai haveli night
    mirror: '/inspiration/85d97d902ebaf088a7e5bf3ea94c2448.jpg', // mirrorwork dupatta
    hunt:   '/inspiration/ac4da3421c6dffbafbcc4c7d75f4098a.jpg', // rekha collage
    cards:  '/inspiration/4134f8b2d1f0d1e89f4cd858c21a2388.jpg', // card game + mehendi
    masala: '/inspiration/863c632563a6cd3c44aaa9987e3525c9.jpg', // dense india collage
  };
  // 4 plot lengths for stress-test (ordered short -> extra long)
  const PLOTS = {
    1: {
      num: 'No. 007', genre: 'Bollywood · Easy',
      plot: 'A man forgets he has a twin.',
      pen: 'yeh to obvious hai bhai',
      worth: 'Worth 1 pt'
    },
    2: {
      num: 'No. 024', genre: 'Bollywood · Medium',
      plot: 'A grieving dancer trains a blind girl to sing in a Greek villa while his mother disapproves.',
      pen: 'arrey itna SAD kyun banaya??',
      worth: 'Worth 2 pts'
    },
    3: {
      num: 'No. 061', genre: 'Tollywood · Hard',
      plot: 'A buffalo herder with anger issues discovers he is the lost prince of a forgotten kingdom, learns ancient martial arts from a bald uncle in three days, and destroys an entire empire for kidnapping his crush.',
      pen: 'boss itna OP hai lekin kaun film?',
      worth: 'Worth 3 pts'
    },
    4: {
      num: 'No. 088', genre: 'Bollywood · Hard',
      plot: 'Two childhood best friends grow up loving the same woman, one becomes a poet and dies tragically, the other raises her child, then twenty years later the child falls in love with a singer who turns out to be the poet reincarnated, and everyone cries in Switzerland.',
      pen: 'bro this is every SRK movie combined',
      worth: 'Worth 3 pts'
    }
  };

  const params = new URLSearchParams(location.search);
  const bgKey = params.get('bg') || 'chai';
  const pKey = params.get('p') || '2';
  const bgUrl = BGS[bgKey] || BGS.chai;
  const data = PLOTS[pKey] || PLOTS[2];

  document.getElementById('bgImg').src = bgUrl;
  document.getElementById('num').textContent = data.num;
  document.getElementById('genre').textContent = data.genre;
  document.getElementById('plot').textContent = data.plot;
  document.getElementById('pen').textContent = data.pen;
  document.getElementById('worth').textContent = data.worth;

  // --- Auto-fit plot text to fixed container ---
  // Shrinks font-size until plot fits, clamped to [15, 26] px.
  function fitPlot() {
    const el = document.getElementById('plot');
    const wrap = el.parentElement; // .plot-wrap
    let size = 26;
    const minSize = 15;
    el.style.fontSize = size + 'px';
    // Force reflow
    while (el.scrollHeight > wrap.clientHeight && size > minSize) {
      size -= 0.5;
      el.style.fontSize = size + 'px';
    }
  }
  // Run after fonts load so measurements are accurate
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(fitPlot);
  } else {
    window.addEventListener('load', fitPlot);
  }
</script>
</body>
</html>
