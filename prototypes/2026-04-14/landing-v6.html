<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Desi Plots — landing v6</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:wght@400;500;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6EBD1;
    --ink: #1A1208;
    --ink-soft: rgba(26,18,8,0.55);
    --ink-line: rgba(26,18,8,0.22);
    --pen: #1B3F8C;
    --tomato: #C8321C;
    --stage: #14100a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #d8cbac;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    color: var(--ink);
  }
  .phone {
    width: 400px;
    height: 860px;
    border-radius: 44px;
    background: var(--stage);
    box-shadow: 0 36px 90px rgba(0,0,0,0.5), 0 0 0 8px #0a0503, 0 0 0 10px #1f1208;
    overflow: hidden;
    position: relative;
  }
  .notch {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 112px;
    height: 26px;
    background: #0a0503;
    border-radius: 14px;
    z-index: 40;
  }
  .bg { position: absolute; inset: 0; }
  .bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center bottom;
    filter: saturate(0.98);
  }
  .wash {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(20,16,8,0.42) 0%, rgba(20,16,8,0.08) 18%, rgba(20,16,8,0.08) 62%, rgba(20,16,8,0.60) 100%);
    pointer-events: none;
  }
  .meta-bar {
    position: absolute;
    top: 52px;
    left: 0;
    right: 0;
    padding: 0 28px;
    display: flex;
    justify-content: space-between;
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    z-index: 15;
    opacity: 0.9;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .meta-bar .right { color: #F7D05B; }

  /* TITLE CARD — cream editorial pane */
  .card {
    position: absolute;
    top: 130px;
    left: 30px;
    right: 30px;
    background: var(--paper);
    border-radius: 4px;
    padding: 28px 28px 24px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(26,18,8,0.15);
    text-align: center;
  }
  .card-kicker {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding-bottom: 14px;
    border-bottom: 1px solid var(--ink-line);
  }
  .card-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 52px;
    line-height: 0.92;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-top: 22px;
  }
  .card-title .amp {
    display: block;
    font-style: italic;
    font-weight: 400;
    font-size: 30px;
    line-height: 1;
    color: var(--tomato);
    margin-top: 8px;
    letter-spacing: -0.01em;
  }
  .card-tag {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 16px;
    line-height: 1.35;
    color: var(--ink);
    margin-top: 22px;
    padding: 0 4px;
  }
  .card-rule {
    height: 1px;
    background: var(--ink-line);
    margin: 20px 0 12px;
  }
  .card-pen {
    font-family: 'Caveat', cursive;
    font-weight: 500;
    font-size: 22px;
    line-height: 1;
    color: var(--pen);
  }
  .card-foot {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 18px;
    padding-top: 12px;
    border-top: 1px solid var(--ink-line);
  }

  /* CTA row */
  .actions {
    position: absolute;
    bottom: 28px;
    left: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 30;
  }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 17px 12px;
    border-radius: 999px;
    border: 1px solid rgba(246,235,209,0.4);
    background: rgba(20,16,8,0.55);
    color: var(--paper);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    cursor: pointer;
  }
  .btn.primary {
    background: var(--paper);
    color: var(--ink);
    border-color: var(--paper);
  }
  .btn-row {
    display: flex;
    gap: 10px;
  }
  .btn-row .btn {
    flex: 1;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="bg"><img src="/inspiration/b0c397fda38eb0c4c5df536cbefa06dc.jpg" alt=""></div>
    <div class="wash"></div>

    <div class="meta-bar">
      <span>Vol. I</span>
      <span class="right">Est. 2026</span>
    </div>

    <div class="card">
      <div class="card-kicker">An Indian Party Game</div>
      <div class="card-title">
        Bad<br>Desi Plots
        <span class="amp">the terrible-plot round</span>
      </div>
      <div class="card-tag">
        Read a plot so bad it should never have been greenlit. Guess the movie before the phone passes.
      </div>
      <div class="card-rule"></div>
      <div class="card-pen">arrey yeh kaunsi picture hai??</div>
      <div class="card-foot">
        <span>2 to 8 players</span>
        <span>5 min rounds</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn primary">Start the round</button>
      <div class="btn-row">
        <button class="btn">How to play</button>
        <button class="btn">Settings</button>
      </div>
    </div>
  </div>
</body>
</html>
