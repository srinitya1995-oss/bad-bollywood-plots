<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Desi Plots — v7 prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:wght@400;500;700&family=Caveat:wght@500;600;700&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6EBD1;
    --paper-warm: #F9F0D9;
    --ink: #1A1208;
    --ink-soft: rgba(26,18,8,0.55);
    --ink-line: rgba(26,18,8,0.22);
    --pen: #1B3F8C;
    --tomato: #C8321C;
    --gold: #E9B23E;
    --stage: #14100a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #1a1109;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    color: var(--ink);
  }
  .phone {
    width: 400px;
    height: 860px;
    border-radius: 44px;
    background: var(--stage);
    box-shadow: 0 36px 90px rgba(0,0,0,0.5), 0 0 0 8px #0a0503, 0 0 0 10px #1f1208;
    overflow: hidden;
    position: relative;
    isolation: isolate;
  }
  .notch {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 112px;
    height: 26px;
    background: #0a0503;
    border-radius: 14px;
    z-index: 50;
  }
  .bg { position: absolute; inset: 0; z-index: 0; }
  .bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    filter: saturate(0.98);
  }
  .wash {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(20,16,8,0.35) 0%, rgba(20,16,8,0.02) 16%, rgba(20,16,8,0.02) 68%, rgba(20,16,8,0.55) 100%);
    pointer-events: none;
    z-index: 1;
  }
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(65% 55% at 50% 45%, transparent 40%, rgba(20,12,4,0.4) 100%);
    pointer-events: none;
    z-index: 2;
  }
  /* subtle bulb glow overlay to amplify the bg's existing fairy lights */
  .bulb-glow {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    height: 160px;
    z-index: 3;
    pointer-events: none;
    background:
      radial-gradient(30px 30px at 14% 30%, rgba(255,220,140,0.55), transparent 70%),
      radial-gradient(30px 30px at 32% 20%, rgba(255,220,140,0.5), transparent 70%),
      radial-gradient(30px 30px at 52% 32%, rgba(255,220,140,0.5), transparent 70%),
      radial-gradient(30px 30px at 70% 22%, rgba(255,220,140,0.55), transparent 70%),
      radial-gradient(30px 30px at 88% 36%, rgba(255,220,140,0.5), transparent 70%);
    mix-blend-mode: screen;
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.95; }
    50% { opacity: 0.65; }
  }

  .meta-bar {
    position: absolute;
    top: 52px;
    left: 0;
    right: 0;
    padding: 0 28px;
    display: flex;
    justify-content: space-between;
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    z-index: 15;
    opacity: 0;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    animation: metaFade 0.5s 0.15s ease-out forwards;
  }
  .meta-bar .score { color: #F7D05B; }
  @keyframes metaFade {
    to { opacity: 0.92; }
  }

  /* Card stack: front face + back face wrapped in a flip container */
  .card-stage {
    position: absolute;
    top: 140px;
    left: 30px;
    right: 30px;
    height: 440px;
    perspective: 1200px;
    z-index: 10;
  }
  .card-flip {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.5, 0.05, 0.2, 1);
  }
  .card-stage.flipped .card-flip {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--paper);
    border-radius: 5px;
    padding: 22px 26px 20px;
    box-shadow: 0 28px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(26,18,8,0.18);
    display: flex;
    flex-direction: column;
  }
  .card-back {
    transform: rotateY(180deg);
    background: linear-gradient(155deg, #2A1810 0%, #1A0F06 100%);
    color: var(--paper);
    padding: 30px 28px 24px;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(246,235,209,0.18);
    border-radius: 3px;
    pointer-events: none;
  }

  /* Card entrance: settle from below with slight tilt */
  .card-stage {
    opacity: 0;
    transform: translateY(60px) rotate(-2.5deg);
    animation: cardSettle 0.8s 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.1) forwards;
  }
  @keyframes cardSettle {
    to { opacity: 1; transform: translateY(0) rotate(-0.8deg); }
  }
  .card-stage.exit {
    animation: cardExit 0.45s cubic-bezier(0.5, 0, 0.9, 0.5) forwards;
  }
  @keyframes cardExit {
    to { opacity: 0; transform: translateY(-80px) rotate(-1.5deg); }
  }

  .card-num {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 4px;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--ink-line);
    flex-shrink: 0;
  }
  .plot-wrap {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: center;
  }
  .card-plot {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 24px;
    line-height: 1.26;
    color: var(--ink);
    letter-spacing: -0.005em;
    text-align: left;
    width: 100%;
  }
  .card-foot {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--ink-line);
    flex-shrink: 0;
  }

  /* Back face content */
  .back-kicker {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: rgba(246,235,209,0.6);
    margin-bottom: 18px;
  }
  .back-title {
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 52px;
    line-height: 1.0;
    color: var(--paper);
    margin-bottom: 14px;
    letter-spacing: -0.018em;
    text-wrap: balance;
  }
  .back-year {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 24px;
  }
  .back-divider {
    width: 36px;
    height: 2px;
    background: rgba(246,235,209,0.35);
    margin: 0 auto 20px;
  }
  .back-cast {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 14px;
    line-height: 1.4;
    color: rgba(246,235,209,0.85);
    max-width: 250px;
  }
  .back-verdict {
    position: absolute;
    bottom: 22px;
    left: 24px;
    right: 24px;
    display: flex;
    justify-content: space-between;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(246,235,209,0.5);
    padding-top: 14px;
    border-top: 1px solid rgba(246,235,209,0.18);
  }
  .back-verdict .pts { color: var(--gold); }

  /* Actions */
  .actions {
    position: absolute;
    bottom: 28px;
    left: 24px;
    right: 24px;
    display: flex;
    gap: 12px;
    z-index: 30;
    opacity: 0;
    transform: translateY(16px);
    animation: actionsIn 0.5s 0.45s ease-out forwards;
  }
  @keyframes actionsIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .btn {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 15px 12px;
    border-radius: 999px;
    border: 1px solid rgba(246,235,209,0.4);
    background: rgba(20,16,8,0.55);
    color: var(--paper);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    cursor: pointer;
    transition: transform 0.15s ease-out, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active {
    transform: scale(0.96);
    background: rgba(20,16,8,0.75);
  }
  .btn.primary {
    background: var(--paper);
    color: var(--ink);
    border-color: var(--paper);
    flex: 1.5;
  }
  .btn.primary:active {
    background: var(--paper-warm);
  }

  /* +pts float when flipping */
  .pts-float {
    position: absolute;
    top: 80px;
    right: 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    z-index: 40;
    pointer-events: none;
    opacity: 0;
  }
  .pts-float.show {
    animation: ptsFloat 1.1s ease-out forwards;
  }
  @keyframes ptsFloat {
    0% { opacity: 0; transform: translateY(10px) scale(0.8); }
    15% { opacity: 1; transform: translateY(0) scale(1.1); }
    30% { transform: translateY(-6px) scale(1); }
    100% { opacity: 0; transform: translateY(-40px) scale(1); }
  }
</style>
</head>
<body>
  <div class="phone" id="phone">
    <div class="notch"></div>
    <div class="bg"><img src="/inspiration/b0c397fda38eb0c4c5df536cbefa06dc.jpg" alt=""></div>
    <div class="wash"></div>
    <div class="vignette"></div>
    <div class="bulb-glow"></div>

    <div class="meta-bar">
      <span id="turn">Turn 1 of 12</span>
      <span class="score" id="score">0 pts</span>
    </div>

    <div class="card-stage" id="stage">
      <div class="card-flip">
        <div class="card-face card-front">
          <div class="card-num">
            <span id="num">No. 024</span>
            <span id="genre">Bollywood · Medium</span>
          </div>
          <div class="plot-wrap">
            <div class="card-plot" id="plot">
              A grieving dancer trains a blind girl to sing in a Greek villa while his mother disapproves.
            </div>
          </div>
          <div class="card-foot">
            <span id="worth">Worth 2 pts</span>
            <span>Pass the phone</span>
          </div>
        </div>
        <div class="card-face card-back">
          <div class="back-kicker">The Movie</div>
          <div class="back-title" id="backTitle">Black</div>
          <div class="back-year" id="backYear">2005 · Bollywood</div>
          <div class="back-divider"></div>
          <div class="back-cast" id="backCast">Amitabh Bachchan, Rani Mukerji. Directed by Sanjay Leela Bhansali.</div>
          <div class="back-verdict">
            <span>Tap skip for next</span>
            <span class="pts" id="backPts">+2 pts</span>
          </div>
        </div>
      </div>
    </div>

    <div class="pts-float" id="ptsFloat">+2</div>

    <div class="actions">
      <button class="btn" id="skipBtn">Skip</button>
      <button class="btn primary" id="flipBtn">Flip Card</button>
    </div>
  </div>
<script>
  // --- deck ---
  const DECK = [
    {
      num: 'No. 024', genre: 'Bollywood · Medium', worth: 'Worth 2 pts', pts: 2,
      plot: 'A grieving dancer trains a blind girl to sing in a Greek villa while his mother disapproves.',
      pen: 'arrey itna SAD kyun banaya??',
      title: 'Black', year: '2005 · Bollywood',
      cast: 'Amitabh Bachchan, Rani Mukerji. Directed by Sanjay Leela Bhansali.'
    },
    {
      num: 'No. 007', genre: 'Bollywood · Easy', worth: 'Worth 1 pt', pts: 1,
      plot: 'A man forgets he has a twin who is also a cop.',
      pen: 'yeh to obvious hai bhai',
      title: 'Judwaa', year: '1997 · Bollywood',
      cast: 'Salman Khan in a double role, Karisma Kapoor, Rambha.'
    },
    {
      num: 'No. 061', genre: 'Tollywood · Hard', worth: 'Worth 3 pts', pts: 3,
      plot: 'A buffalo herder with anger issues discovers he is the lost prince of a forgotten kingdom and destroys an entire empire for kidnapping his crush.',
      pen: 'boss itna OP hai lekin kaun film?',
      title: 'Baahubali 2', year: '2017 · Tollywood',
      cast: 'Prabhas, Anushka Shetty, Rana Daggubati. Directed by S. S. Rajamouli.'
    },
    {
      num: 'No. 042', genre: 'Bollywood · Medium', worth: 'Worth 2 pts', pts: 2,
      plot: 'A rich girl meets a poor boy on a Europe trip, they fall in love, her father disapproves, someone sings in a mustard field.',
      pen: 'DDLJ dekha kya nahi??',
      title: 'Dilwale Dulhania Le Jayenge', year: '1995 · Bollywood',
      cast: 'Shah Rukh Khan, Kajol, Amrish Puri. Directed by Aditya Chopra.'
    },
    {
      num: 'No. 088', genre: 'Bollywood · Hard', worth: 'Worth 3 pts', pts: 3,
      plot: 'Two childhood best friends grow up loving the same woman, one becomes a poet and dies, the other raises her child, and everyone cries in Switzerland.',
      pen: 'bro this is every SRK movie combined',
      title: 'Kuch Kuch Hota Hai', year: '1998 · Bollywood',
      cast: 'Shah Rukh Khan, Kajol, Rani Mukerji. Directed by Karan Johar.'
    }
  ];

  let idx = 0;
  let score = 0;
  let flipped = false;
  let animating = false;

  const stage = document.getElementById('stage');
  const flipBtn = document.getElementById('flipBtn');
  const skipBtn = document.getElementById('skipBtn');
  const scoreEl = document.getElementById('score');
  const turnEl = document.getElementById('turn');
  const ptsFloat = document.getElementById('ptsFloat');

  function render() {
    const c = DECK[idx];
    document.getElementById('num').textContent = c.num;
    document.getElementById('genre').textContent = c.genre;
    document.getElementById('plot').textContent = c.plot;
    document.getElementById('worth').textContent = c.worth;
    document.getElementById('backTitle').textContent = c.title;
    document.getElementById('backYear').textContent = c.year;
    document.getElementById('backCast').textContent = c.cast;
    document.getElementById('backPts').textContent = '+' + c.pts + ' pts';
    turnEl.textContent = 'Turn ' + (idx + 1) + ' of ' + DECK.length;
    fitPlot();
  }

  function fitPlot() {
    const el = document.getElementById('plot');
    const wrap = el.parentElement;
    let size = 26;
    const minSize = 15;
    el.style.fontSize = size + 'px';
    while (el.scrollHeight > wrap.clientHeight && size > minSize) {
      size -= 0.5;
      el.style.fontSize = size + 'px';
    }
  }

  function flipCard() {
    if (animating) return;
    if (flipped) return;
    flipped = true;
    stage.classList.add('flipped');
    const c = DECK[idx];
    score += c.pts;
    ptsFloat.textContent = '+' + c.pts;
    ptsFloat.classList.remove('show');
    void ptsFloat.offsetWidth;
    ptsFloat.classList.add('show');
    setTimeout(() => { scoreEl.textContent = score + ' pts'; }, 280);
    flipBtn.textContent = 'Next Card';
  }

  function nextCard() {
    if (animating) return;
    animating = true;
    stage.classList.add('exit');
    setTimeout(() => {
      idx = (idx + 1) % DECK.length;
      flipped = false;
      stage.classList.remove('flipped');
      stage.classList.remove('exit');
      // reset animation
      stage.style.animation = 'none';
      void stage.offsetWidth;
      stage.style.animation = '';
      render();
      flipBtn.textContent = 'Flip Card';
      animating = false;
    }, 450);
  }

  flipBtn.addEventListener('click', () => {
    if (flipped) nextCard();
    else flipCard();
  });
  skipBtn.addEventListener('click', () => {
    if (!animating) nextCard();
  });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); flipBtn.click(); }
    if (e.key === 's' || e.key === 'S') skipBtn.click();
  });

  if (document.fonts && document.fonts.ready) document.fonts.ready.then(render);
  else window.addEventListener('load', render);
</script>
</body>
</html>
