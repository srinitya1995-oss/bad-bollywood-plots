<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Desi Plots — v8 results</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,800;0,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_v8.css">
<style>
  .panel {
    position: absolute;
    top: 128px;
    left: 22px;
    right: 22px;
    bottom: 146px;
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 6px 8px 0 var(--ink), 0 28px 60px rgba(20,10,5,0.55);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }
  .panel-mast {
    padding: 10px 18px 9px;
    background: var(--tomato);
    color: var(--paper);
    border-bottom: 3px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-shrink: 0;
  }
  .panel-mast-title {
    font-family: 'Anton', sans-serif;
    font-size: 20px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .panel-mast-sub {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--gold-bright);
  }

  .winner {
    padding: 24px 22px 18px;
    text-align: center;
    border-bottom: 2px dashed var(--ink-line);
    flex-shrink: 0;
  }
  .winner-kicker {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.38em;
    color: var(--tomato);
  }
  .winner-name {
    font-family: 'Anton', sans-serif;
    font-size: 56px;
    line-height: 0.88;
    color: var(--ink);
    text-transform: uppercase;
    margin: 6px 0 4px;
    text-shadow: 3px 3px 0 var(--gold-bright);
  }
  .winner-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 15px;
    color: var(--ink-soft);
  }
  .winner-crown {
    display: inline-block;
    padding: 3px 10px;
    background: var(--gold-bright);
    border: 2px solid var(--ink);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .board {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px 12px;
  }
  .board-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.24em;
    color: var(--tomato);
    margin-bottom: 8px;
    text-align: left;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 8px;
    border-bottom: 1px dashed var(--ink-line);
  }
  .row.leader { background: rgba(245,196,87,0.18); border-left: 4px solid var(--gold-bright); padding-left: 10px; }
  .rank {
    width: 24px;
    font-family: 'Anton', sans-serif;
    font-size: 20px;
    color: var(--ink);
    text-align: center;
  }
  .rank.first { color: var(--tomato); }
  .name {
    flex: 1;
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
  }
  .score-col {
    font-family: 'Anton', sans-serif;
    font-size: 22px;
    color: var(--ink);
  }
  .score-col .unit {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    color: var(--ink-soft);
    margin-left: 2px;
    letter-spacing: 0.14em;
  }

  .cta {
    position: absolute;
    bottom: 28px;
    left: 22px;
    right: 22px;
    display: flex;
    gap: 12px;
    z-index: 20;
  }
  .cta .btn { flex: 1; }
  .cta .btn.primary { flex: 1.6; }

  .stamp {
    position: absolute;
    top: 150px;
    right: 24px;
    width: 72px;
    height: 72px;
    border: 2px solid var(--tomato);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(10deg);
    z-index: 15;
    background: rgba(246,235,209,0.95);
    color: var(--tomato);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-align: center;
    line-height: 1.1;
    box-shadow: inset 0 0 0 2px rgba(200,50,28,0.35);
  }
  .stamp strong { display: block; font-family: 'Anton', sans-serif; font-size: 14px; letter-spacing: 0; }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="bg"><img src="/inspiration/b0c397fda38eb0c4c5df536cbefa06dc.jpg" alt=""></div>
    <div class="wash"></div>
    <div class="bulb-glow"></div>

    <div class="topband">
      <div class="topband-title">Bad <span class="t2">Desi</span> Plots</div>
      <div class="topband-right">
        <span>Round Over</span>
        <span class="divider"></span>
        <span class="pts">12 Turns</span>
      </div>
    </div>

    <div class="panel slideup d1">
      <div class="panel-mast">
        <span class="panel-mast-title">Final Verdict</span>
        <span class="panel-mast-sub">12 Plots Played</span>
      </div>

      <div class="winner">
        <div class="winner-crown">★ Top Guesser ★</div>
        <div class="winner-kicker">Tonight's Winner</div>
        <div class="winner-name">Priya</div>
        <div class="winner-title">"Clearly watches too many South Indian remakes."</div>
      </div>

      <div class="board">
        <div class="board-label">The Line-Up</div>
        <div class="row leader">
          <span class="rank first">1</span>
          <span class="name">Priya</span>
          <span class="score-col">17<span class="unit">PTS</span></span>
        </div>
        <div class="row">
          <span class="rank">2</span>
          <span class="name">Kavita</span>
          <span class="score-col">14<span class="unit">PTS</span></span>
        </div>
        <div class="row">
          <span class="rank">3</span>
          <span class="name">Raj</span>
          <span class="score-col">11<span class="unit">PTS</span></span>
        </div>
        <div class="row">
          <span class="rank">4</span>
          <span class="name">Arjun</span>
          <span class="score-col">8<span class="unit">PTS</span></span>
        </div>
      </div>
    </div>

    <div class="stamp slideup d2">
      PLAYED
      <strong>APRIL 15</strong>
      2026
    </div>

    <div class="cta">
      <button class="btn">Home</button>
      <button class="btn primary">Play Again</button>
    </div>
  </div>
</body>
</html>
