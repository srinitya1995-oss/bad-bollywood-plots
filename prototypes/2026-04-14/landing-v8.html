<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Desi Plots — v8 landing</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,800;0,900;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_v8.css">
<style>
  .hero {
    position: absolute;
    top: 170px;
    left: 24px;
    right: 24px;
    padding: 30px 26px 28px;
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 6px 8px 0 var(--ink), 0 28px 60px rgba(20,10,5,0.55);
    text-align: center;
    z-index: 10;
  }
  .hero-kicker {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--tomato);
    margin-bottom: 4px;
  }
  .hero-title {
    font-family: 'Anton', sans-serif;
    font-size: 66px;
    line-height: 0.88;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-transform: uppercase;
    margin: 10px 0 6px;
    text-shadow: 3px 3px 0 var(--tomato);
  }
  .hero-title .desi {
    display: block;
    color: var(--tomato);
    text-shadow: 3px 3px 0 var(--ink);
  }
  .hero-tag {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 17px;
    line-height: 1.3;
    color: var(--ink);
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--ink-line);
  }
  .hero-meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--ink-line);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
  }
  .hero-meta span { display: inline-flex; align-items: center; gap: 6px; }
  .hero-meta .dot { width: 3px; height: 3px; background: var(--tomato); border-radius: 50%; }

  .cta-stack {
    position: absolute;
    bottom: 34px;
    left: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 20;
  }
  .cta-stack .btn { width: 100%; }
  .cta-sec {
    display: flex;
    gap: 12px;
  }
  .cta-sec .btn {
    flex: 1;
    font-size: 13px;
    padding: 13px 12px 11px;
    box-shadow: 3px 4px 0 var(--ink);
  }

  /* decorative ornaments */
  .stamp {
    position: absolute;
    top: 142px;
    right: 32px;
    width: 84px;
    height: 84px;
    border: 2px solid var(--tomato);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-14deg);
    z-index: 15;
    background: rgba(246,235,209,0.05);
    color: var(--tomato);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-align: center;
    line-height: 1.05;
    box-shadow: inset 0 0 0 2px rgba(200,50,28,0.25);
  }
  .stamp strong {
    display: block;
    font-size: 16px;
    font-family: 'Anton', sans-serif;
    letter-spacing: 0;
    margin: 2px 0;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="bg"><img src="/inspiration/b0c397fda38eb0c4c5df536cbefa06dc.jpg" alt=""></div>
    <div class="wash"></div>
    <div class="bulb-glow"></div>

    <div class="topband">
      <div class="topband-title">VOL. 1<span class="t2"> EST. 2026</span></div>
      <div class="topband-right">
        <span>An Indian</span>
        <span class="divider"></span>
        <span class="pts">Party Game</span>
      </div>
    </div>

    <div class="stamp slideup d2">
      OFFICIALLY
      <strong>BAD</strong>
      SINCE 2026
    </div>

    <div class="hero slideup d1">
      <div class="hero-kicker">Tonight's Round</div>
      <h1 class="hero-title">Bad<span class="desi">Desi</span>Plots</h1>
      <p class="hero-tag">Read a plot so bad it should never have been greenlit. Guess the movie before the phone passes.</p>
      <div class="hero-meta">
        <span>2 – 8 Players</span>
        <span class="dot"></span>
        <span>6 Min Rounds</span>
        <span class="dot"></span>
        <span>500+ Plots</span>
      </div>
    </div>

    <div class="cta-stack">
      <button class="btn primary slideup d3">Start the Round</button>
      <div class="cta-sec">
        <button class="btn slideup d4">How to Play</button>
        <button class="btn slideup d5">Settings</button>
      </div>
    </div>
  </div>
</body>
</html>
