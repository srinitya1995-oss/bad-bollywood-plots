<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Desi Plots — v6 · chai-cheers bg + clean card</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:wght@400;500;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6EBD1;
    --ink: #1A1208;
    --ink-soft: rgba(26,18,8,0.55);
    --ink-line: rgba(26,18,8,0.22);
    --pen: #1B3F8C;
    --tomato: #C8321C;
    --stage: #14100a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #d8cbac;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    color: var(--ink);
  }
  .phone {
    width: 400px;
    height: 860px;
    border-radius: 44px;
    background: var(--stage);
    box-shadow: 0 36px 90px rgba(0,0,0,0.5), 0 0 0 8px #0a0503, 0 0 0 10px #1f1208;
    overflow: hidden;
    position: relative;
  }
  .notch {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 112px;
    height: 26px;
    background: #0a0503;
    border-radius: 14px;
    z-index: 40;
  }
  .bg { position: absolute; inset: 0; }
  .bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center bottom;
    filter: saturate(0.98);
  }
  .wash {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(20,16,8,0.35) 0%, rgba(20,16,8,0.05) 15%, rgba(20,16,8,0.05) 65%, rgba(20,16,8,0.55) 100%);
    pointer-events: none;
  }
  .meta-bar {
    position: absolute;
    top: 52px;
    left: 0;
    right: 0;
    padding: 0 28px;
    display: flex;
    justify-content: space-between;
    color: var(--paper);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    z-index: 15;
    opacity: 0.9;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .meta-bar .score { color: #F7D05B; }

  /* CARD — cream pull-quote, floating over the chai scene */
  .card {
    position: absolute;
    top: 150px;
    left: 30px;
    right: 30px;
    background: var(--paper);
    border-radius: 4px;
    padding: 28px 28px 22px;
    box-shadow: 0 24px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(26,18,8,0.15);
  }
  .card-wordmark {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 9px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding-bottom: 14px;
    border-bottom: 1px solid var(--ink-line);
  }
  .card-num {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 10px;
    margin-bottom: 18px;
  }
  .card-plot {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 23px;
    line-height: 1.26;
    color: var(--ink);
    letter-spacing: -0.005em;
    text-align: left;
  }
  .card-rule {
    height: 1px;
    background: var(--ink-line);
    margin: 20px 0 14px;
  }
  .card-pen {
    font-family: 'Caveat', cursive;
    font-weight: 500;
    font-size: 20px;
    line-height: 1;
    color: var(--pen);
    text-align: left;
  }
  .card-foot {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--ink-line);
  }

  .actions {
    position: absolute;
    bottom: 28px;
    left: 24px;
    right: 24px;
    display: flex;
    gap: 12px;
    z-index: 30;
  }
  .btn {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 15px 12px;
    border-radius: 999px;
    border: 1px solid rgba(246,235,209,0.4);
    background: rgba(20,16,8,0.55);
    color: var(--paper);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .btn.primary {
    background: var(--paper);
    color: var(--ink);
    border-color: var(--paper);
    flex: 1.5;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="bg"><img src="/inspiration/b0c397fda38eb0c4c5df536cbefa06dc.jpg" alt=""></div>
    <div class="wash"></div>

    <div class="meta-bar">
      <span>Turn 3</span>
      <span class="score">12 pts</span>
    </div>

    <div class="card">
      <div class="card-wordmark">Bad Desi Plots</div>
      <div class="card-num">
        <span>No. 024</span>
        <span>Bollywood · Medium</span>
      </div>
      <div class="card-plot">
        A grieving dancer trains a blind girl to sing in a Greek villa while his mother disapproves. A chiffon saree is always flying.
      </div>
      <div class="card-rule"></div>
      <div class="card-pen">arrey itna SAD kyun banaya??</div>
      <div class="card-foot">
        <span>Worth 2 pts</span>
        <span>Pass the phone</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn">Skip</button>
      <button class="btn primary">Flip Card</button>
    </div>
  </div>
</body>
</html>
