<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Desi Plots — v8 player setup</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_v8.css">
<style>
  .panel {
    position: absolute;
    top: 130px;
    left: 22px;
    right: 22px;
    bottom: 140px;
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow: 6px 8px 0 var(--ink), 0 28px 60px rgba(20,10,5,0.55);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }
  .panel-mast {
    padding: 10px 18px 9px;
    background: var(--tomato);
    color: var(--paper);
    border-bottom: 3px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-shrink: 0;
  }
  .panel-mast-title {
    font-family: 'Anton', sans-serif;
    font-size: 20px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 0.9;
  }
  .panel-mast-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--gold-bright);
  }

  .mode {
    display: flex;
    padding: 16px 16px 0;
    gap: 10px;
    flex-shrink: 0;
  }
  .mode-btn {
    flex: 1;
    background: transparent;
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 10px 8px 8px;
    font-family: 'Anton', sans-serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    text-align: center;
  }
  .mode-btn .sub {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    margin-top: 3px;
    text-transform: uppercase;
  }
  .mode-btn.active {
    background: var(--ink);
    color: var(--gold-bright);
    box-shadow: 3px 3px 0 var(--tomato);
  }
  .mode-btn.active .sub { color: var(--paper); }

  .players-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.24em;
    color: var(--tomato);
    padding: 18px 18px 8px;
    border-top: 1px dashed var(--ink-line);
    margin-top: 14px;
    flex-shrink: 0;
  }

  .players {
    flex: 1;
    overflow-y: auto;
    padding: 0 14px 10px;
  }
  .player-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px dashed var(--ink-line);
  }
  .player-row .num {
    width: 26px;
    height: 26px;
    background: var(--tomato);
    color: var(--paper);
    border: 2px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Anton', sans-serif;
    font-size: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .player-row .num.tw { background: var(--emerald); }
  .player-row input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    padding: 4px 0;
    outline: none;
  }
  .player-row input::placeholder { color: var(--ink-soft); font-style: italic; }
  .player-row .x {
    background: none;
    border: 1px solid var(--ink-line);
    color: var(--ink-soft);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
  }

  .add-player {
    margin: 8px 18px 14px;
    padding: 10px;
    border: 2px dashed var(--ink);
    background: transparent;
    font-family: 'Anton', sans-serif;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    border-radius: 4px;
    flex-shrink: 0;
  }

  .cta {
    position: absolute;
    bottom: 30px;
    left: 22px;
    right: 22px;
    display: flex;
    gap: 12px;
    z-index: 20;
  }
  .cta .btn { flex: 1; }
  .cta .btn.primary { flex: 1.6; }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="bg"><img src="/inspiration/b0c397fda38eb0c4c5df536cbefa06dc.jpg" alt=""></div>
    <div class="wash"></div>
    <div class="bulb-glow"></div>

    <div class="topband">
      <div class="topband-title">Bad <span class="t2">Desi</span> Plots</div>
      <div class="topband-right">
        <span>Setup</span>
        <span class="divider"></span>
        <span class="pts">Step 1</span>
      </div>
    </div>

    <div class="panel slideup d1">
      <div class="panel-mast">
        <span class="panel-mast-title">Who's Playing?</span>
        <span class="panel-mast-num">2 – 8</span>
      </div>

      <div class="mode">
        <button class="mode-btn active">Pass &amp; Play<span class="sub">One Phone · Party</span></button>
        <button class="mode-btn">Solo<span class="sub">Just Me · Chill</span></button>
      </div>

      <div class="players-label">The Line-Up</div>
      <div class="players">
        <div class="player-row"><span class="num">1</span><input value="Kavita"><button class="x">X</button></div>
        <div class="player-row"><span class="num">2</span><input value="Raj"><button class="x">X</button></div>
        <div class="player-row"><span class="num tw">3</span><input value="Priya"><button class="x">X</button></div>
        <div class="player-row"><span class="num">4</span><input value="Arjun"><button class="x">X</button></div>
        <div class="player-row"><span class="num tw">5</span><input placeholder="add name…"><button class="x">X</button></div>
      </div>

      <button class="add-player">+ Add Player</button>
    </div>

    <div class="cta">
      <button class="btn">Back</button>
      <button class="btn primary">Deal the Cards</button>
    </div>
  </div>
</body>
</html>
